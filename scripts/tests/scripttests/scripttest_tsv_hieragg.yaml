# scripttestlib tests for tsv-hieragg

# Default input and output
- defaults:
    output:
      # Successful runs with no errors
      stderr: ''


# Basic tests: Single key level

- name: 'tsv-hieragg: Single key with two rows'
  input:
    cmdline: tsv-hieragg --last-key 1
    stdin: |
      key	count
      A	5
      A	3
      B	2
  output:
    stdout: |
      key	count	sum_count
      A	2	8
      B	1	2


# Tests: Multiple key levels (hierarchical)

- name: 'tsv-hieragg: Two key levels'
  input:
    cmdline: tsv-hieragg --last-key 2
    stdin: |
      region	city	count
      North	Oslo	100
      North	Oslo	50
      North	Bergen	75
      South	Cape	25
  output:
    stdout: |
      region	city	count	sum_count
      North	*	3	225
      _	Oslo	2	150
      _	Bergen	1	75
      South	*	1	25
      _	Cape	1	25


- name: 'tsv-hieragg: Three key levels'
  input:
    cmdline: tsv-hieragg --last-key 3
    stdin: |
      country	state	city	count
      USA	NY	NYC	100
      USA	NY	Buffalo	20
      USA	CA	LA	80
      USA	CA	SF	30
      Canada	ON	Toronto	50
  output:
    stdout: |
      country	state	city	count	sum_count
      USA	*	*	4	230
      _	NY	*	2	120
      _	_	NYC	1	100
      _	_	Buffalo	1	20
      _	CA	*	2	110
      _	_	LA	1	80
      _	_	SF	1	30
      Canada	*	*	1	50
      _	ON	*	1	50
      _	_	Toronto	1	50


# Tests: Multiple value columns

- name: 'tsv-hieragg: Multiple value columns'
  input:
    cmdline: tsv-hieragg --last-key 1
    stdin: |
      type	val1	val2	val3
      X	1	10	100
      X	2	20	200
      Y	3	30	300
  output:
    stdout: |
      type	count	sum_val1	sum_val2	sum_val3
      X	2	3	30	300
      Y	1	3	30	300


# Tests: Named column reference

- name: 'tsv-hieragg: Named column as key'
  input:
    cmdline: tsv-hieragg --last-key category
    stdin: |
      category	amount
      Food	30
      Food	20
      Clothes	50
  output:
    stdout: |
      category	count	sum_amount
      Food	2	50
      Clothes	1	50


# Tests: No header mode

- name: 'tsv-hieragg: No header mode'
  input:
    cmdline: tsv-hieragg --no-header --last-key 1
    stdin: |
      A	10
      A	5
      B	3
  output:
    stdout: |
      A	2	15
      B	1	3


# Tests: Edge cases

- name: 'tsv-hieragg: Single data row'
  input:
    cmdline: tsv-hieragg --last-key 1
    stdin: |
      key	value
      X	100
  output:
    stdout: |
      key	count	sum_value
      X	1	100


- name: 'tsv-hieragg: All identical keys'
  input:
    cmdline: tsv-hieragg --last-key 1
    stdin: |
      key	count
      A	10
      A	20
      A	5
  output:
    stdout: |
      key	count	sum_count
      A	3	35


- name: 'tsv-hieragg: Complex key changes'
  input:
    cmdline: tsv-hieragg --last-key 2
    stdin: |
      group	subgroup	count
      A	1	10
      A	2	20
      B	1	30
      B	2	40
  output:
    stdout: |
      group	subgroup	count	sum_count
      A	*	2	30
      _	1	1	10
      _	2	1	20
      B	*	2	70
      _	1	1	30
      _	2	1	40


# Tests: Error cases

- name: 'tsv-hieragg: Error - key field too large'
  input:
    cmdline: tsv-hieragg --last-key 5
    stdin: |
      key	value
      A	10
  output:
    returncode: 1
    stderr:
      contains: 'last key field larger than field count'


- name: 'tsv-hieragg: Error - key field zero'
  input:
    cmdline: tsv-hieragg --last-key 0
    stdin: |
      key	value
      A	10
  output:
    returncode: 1
    stderr:
      contains: 'last key field value less than 1'


- name: 'tsv-hieragg: Error - named key not found'
  input:
    cmdline: tsv-hieragg --last-key nonexistent
    stdin: |
      key	value
      A	10
  output:
    returncode: 1
    stderr:
      contains: 'last key field not found'


- name: 'tsv-hieragg: Error - no-header with named key'
  input:
    cmdline: tsv-hieragg --no-header --last-key fieldname
    stdin: |
      A	10
  output:
    returncode: 1
    stderr:
      contains: '--no-header requires an integer argument'


# Tests: Warnings

- name: 'tsv-hieragg: Warning - non-numeric value'
  input:
    cmdline: tsv-hieragg --last-key 1
    stdin: |
      key	count
      A	10
      A	abc
      B	5
  output:
    stderr:
      contains: 'Invalid integer value'
